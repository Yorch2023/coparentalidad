function today(){ return new Date().toISOString().slice(0,10); }
function fmt(d){ if(!d) return ""; const [y,m,day]=d.slice(0,10).split("-"); return `${day}/${m}/${y}`; }
function fmtMoney(n){ return Number(n||0).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+" €"; }
function daysBetween(from,to){ return Math.max(0,Math.round((new Date(to+"T12:00:00")-new Date(from+"T12:00:00"))/86400000)+1); }
function daysUntil(d){ return Math.ceil((new Date(d+"T12:00:00")-new Date())/86400000); }
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") e.className=v;
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{ if(c!=null) e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}

// ── State ─────────────────────────────────────────────────────────────────────
let STATE = {

let realtimeSubs = [];

// ── Supabase data layer ───────────────────────────────────────────────────────
async function loadAll(){
  const [ev,ex,ag,ms,wl,ch] = await Promise.all([
    sb.from("events").select("*").order("from_date"),
    sb.from("expenses").select("*").order("date",{ascending:false}),
    sb.from("agreements").select("*").order("date",{ascending:false}),
    sb.from("messages").select("*").order("ts"),
    sb.from("wishlist").select("*").order("created_at"),
    sb.from("child_profile").select("*").limit(1).single()
  ]);
  STATE.events = (ev.data||[]).map(r=>({...r, from:r.from_date, to:r.to_date, changeRequest:r.change_request, changeStatus:r.change_status}));
  STATE.expenses = (ex.data||[]).map(r=>({...r, desc:r.description, paidBy:r.paid_by, liquidatedAt:r.liquidated_at}));
  STATE.agreements = ag.data||[];
  STATE.messages = (ms.data||[]).map(r=>({...r, from:r.from_user}));
  STATE.wishlist = (wl.data||[]).map(r=>({...r, requestedBy:r.requested_by, addedAt:r.added_at}));
  if(ch.data) STATE.child = ch.data;
}

function subscribeRealtime(){
  realtimeSubs.forEach(s=>sb.removeChannel(s));
  realtimeSubs = [];
  const tables=["events","expenses","agreements","messages","wishlist","child_profile"];
  tables.forEach(t=>{
    const ch=sb.channel(`rt-${t}`).on("postgres_changes",{event:"*",schema:"public",table:t},()=>{ loadAll().then(render); }).subscribe();
    realtimeSubs.push(ch);
  });
}

// ── DB mutations ──────────────────────────────────────────────────────────────
async function addEvent(f){
  await sb.from("events").insert({from_date:f.from,to_date:f.to,who:f.who,note:f.note,change_request:f.changeRequest,change_status:f.changeStatus,created_by:STATE.user?.role});
  await loadAll(); render();
}
async function deleteEvent(id){ await sb.from("events").delete().eq("id",id); await loadAll(); render(); }
async function updateEvent(id,data){ await sb.from("events").update(data).eq("id",id); await loadAll(); render(); }

async function addExpense(f){
  await sb.from("expenses").insert({date:f.date,description:f.desc,amount:f.amount,cat:f.cat,paid_by:f.paidBy,split:f.split,status:f.status,note:f.note,created_by:STATE.user?.role});
  await loadAll(); render();
}
async function deleteExpense(id){ await sb.from("expenses").delete().eq("id",id); await loadAll(); render(); }
async function toggleExpense(id){
  const e=STATE.expenses.find(x=>x.id===id);
  const newStatus=e.status==="pendiente"?"liquidado":"pendiente";
  await sb.from("expenses").update({status:newStatus,liquidated_at:newStatus==="liquidado"?new Date().toISOString():null}).eq("id",id);
  await loadAll(); render();
}

async function addAgreement(f){
  await sb.from("agreements").insert({date:f.date,title:f.title,detail:f.detail,category:f.category,status:"activo",created_by:STATE.user?.role});
  await loadAll(); render();
}
async function deleteAgreement(id){ await sb.from("agreements").delete().eq("id",id); await loadAll(); render(); }
async function toggleAgreement(id){
  const a=STATE.agreements.find(x=>x.id===id);
  await sb.from("agreements").update({status:a.status==="activo"?"archivado":"activo"}).eq("id",id);
  await loadAll(); render();
}

async function sendMessage(text,from){
  await sb.from("messages").insert({from_user:from,text});
  await loadAll(); render();
}

async function addWish(f){
  await sb.from("wishlist").insert({item:f.item,priority:f.priority,requested_by:f.requestedBy,done:false});
  await loadAll(); render();
}
async function deleteWish(id){ await sb.from("wishlist").delete().eq("id",id); await loadAll(); render(); }
async function toggleWish(id){
  const w=STATE.wishlist.find(x=>x.id===id);
  await sb.from("wishlist").update({done:!w.done}).eq("id",id);
  await loadAll(); render();
}

async function saveChild(data){
  await sb.from("child_profile").update(data).eq("id",STATE.child.id);
  await loadAll(); render();
}

function renderApp(){
  const {expenses,events,agreements,messages,child}=STATE;
  const pending=expenses.filter(e=>e.status==="pendiente");
  let deudaText="";
  const bal={J:0,E:0};
  pending.forEach(e=>{
    const a=parseFloat(e.amount||0);
    if(e.split==="50-50"){const h=a/2;if(e.paidBy==="J")bal.E+=h;else bal.J+=h;}
    else if(e.split==="100% Jorge"){if(e.paidBy==="E")bal.J+=a;}
    else if(e.split==="100% Eva"){if(e.paidBy==="J")bal.E+=a;}
  });
  const diff=bal.E-bal.J;
  if(diff!==0) deudaText=diff>0?`Eva debe ${fmtMoney(diff)}`:`Jorge debe ${fmtMoney(Math.abs(diff))}`;

  // Alerts
  const alerts=[];
  expenses.filter(e=>e.status==="pendiente").forEach(e=>{
    const age=Math.round((Date.now()-new Date(e.date+"T12:00:00"))/86400000);
    if(age>=14) alerts.push(`"${e.desc}" lleva ${age} días pendiente`);
  });
  events.forEach(ev=>{
    const d=daysUntil(ev.from);
    if(d>=0&&d<=3) alerts.push(`Custodia ${ev.who==="J"?"Jorge":ev.who==="E"?"Eva":"ambos"} ${d===0?"hoy":`en ${d}d`}`);
  });
  events.filter(ev=>ev.changeStatus==="pendiente").forEach(()=>alerts.push("Solicitud de cambio pendiente"));

  const TABS=["📅 Custodia","💶 Gastos","👤 Ficha","📝 Acuerdos","📊 Resumen"];

  const wrap=el("div",{style:{minHeight:"100vh",background:"#f8fafc"}});

  const hdr=el("div",{style:{background:"#1e293b",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}});

  hdrL.children[1].append(

  hdr.append(hdrL,hdrR);

  // Alerts
  let alertBanner=null;

    alertBanner=el("div",{style:{background:"#fef3c7",borderBottom:"1px solid #fde68a",padding:"7px 16px",display:"flex",gap:8,overflowX:"auto",alignItems:"center"}});
    alertBanner.appendChild(el("span",{style:{fontSize:13,flexShrink:0}},"⚠️"));

  if(STATE.tab===1) content.appendChild(renderGastos());

// ── CUSTODIA ──────────────────────────────────────────────────────────────────
function renderCustodia(){
  const {events}=STATE;
  const wrap=el("div",{});
  const dayMap={};

  const dim=new Date(UI.calYear,UI.calMonth+1,0).getDate();
  const offset=(firstDay+6)%7;

  // Nav

  // Calendar

      el("div",{style:{fontWeight:700,fontSize:13,color:CUSTODY_COLORS[s.who],marginBottom:3}},`${s.who==="J"?"Jorge":s.who==="E"?"Eva":"Ambos"}: ${fmt(s.from)} → ${fmt(s.to)} · ${daysBetween(s.from,s.to)}d`),
    );
    if(s.note) sInfo.appendChild(el("div",{style:{fontSize:12,color:"#64748b",marginBottom:4}},s.note));
    if(s.changeStatus==="pendiente"){
      sInfo.appendChild(el("div",{style:{background:"#fef3c7",borderRadius:6,padding:"4px 8px",fontSize:11,color:"#78350f",marginBottom:6}},"⏳ Solicitud pendiente de confirmar"));
    }
    const sBtns=el("div",{style:{display:"flex",gap:5,flexShrink:0}});
    if(s.changeStatus==="pendiente"){
      sBtns.appendChild(el("button",{style:{background:"#dcfce7",color:"#166534",border:"none",borderRadius:7,padding:"5px 8px",fontSize:11},onClick:()=>{updateEvent(s.id,{change_status:"confirmado"}).then(()=>UI.calSelected=null);}},`✓ Confirmar`));
      sBtns.appendChild(el("button",{style:{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:7,padding:"5px 8px",fontSize:11},onClick:()=>{deleteEvent(s.id).then(()=>UI.calSelected=null);}},`✗ Rechazar`));

      form.append(r1,tr,dr,el("button",{style:{...btnPrimarySt,width:"100%"},onClick:async()=>{if(!UI.agForm.title)return;await addAgreement(UI.agForm);UI.showAgForm=false;UI.agForm={date:today(),title:"",detail:"",category:"General"};}},"Guardar"));
      wrap.appendChild(form);
    }

    if(archived.length>0){
      wrap.appendChild(el("div",{style:{fontSize:11,fontWeight:600,color:"#94a3b8",marginTop:16,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}},`Archivados (${archived.length})`));
      archived.forEach(a=>{
        const row=el("div",{style:{...cardSt,marginBottom:8,opacity:0.5}});
        const top=el("div",{style:{display:"flex",justifyContent:"space-between"}});
        const info=el("div",{});info.append(el("div",{style:{fontSize:10,color:"#94a3b8",marginBottom:2}},`${fmt(a.date)} · ${a.category}`),el("div",{style:{fontSize:13,fontWeight:600}},a.title));
        top.append(info,el("button",{style:{fontSize:10,padding:"3px 7px",borderRadius:6,border:"none",background:"#f1f5f9",color:"#64748b",alignSelf:"start"},onClick:()=>toggleAgreement(a.id)},"Restaurar"));
        row.appendChild(top);wrap.appendChild(row);
      });
    }
  }

  if(UI.agSubTab===1){
    wrap.appendChild(el("div",{style:{background:"#f8fafc",borderRadius:10,padding:"7px 12px",marginBottom:12,fontSize:11,color:"#64748b"}},"📌 Registro con sello de tiempo. Los mensajes no se pueden editar una vez guardados."));
    const msgBox=el("div",{style:{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,height:340,overflowY:"auto",padding:12,marginBottom:12},id:"msgBox"});
    if(messages.length===0) msgBox.appendChild(el("div",{style:{textAlign:"center",color:"#94a3b8",padding:"60px 0",fontSize:13}},"Sin mensajes"));
    messages.forEach(m=>{
      const isMe=m.from===STATE.user?.role;
      const mWrap=el("div",{style:{display:"flex",justifyContent:isMe?"flex-end":"flex-start",marginBottom:10}});
      const mInner=el("div",{style:{maxWidth:"75%"}});
      mInner.append(
        el("div",{style:{background:isMe?"#2563eb":"#f1f5f9",color:isMe?"#fff":"#1e293b",borderRadius:isMe?"12px 12px 2px 12px":"12px 12px 12px 2px",padding:"8px 12px",fontSize:13,lineHeight:1.4}},m.text),
        el("div",{style:{fontSize:10,color:"#94a3b8",marginTop:3,textAlign:isMe?"right":"left"}},`${m.from==="J"?"Jorge":"Eva"} · ${new Date(m.ts).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}`)
      );
      mWrap.appendChild(mInner);msgBox.appendChild(mWrap);
    });
    setTimeout(()=>{const b=document.getElementById("msgBox");if(b)b.scrollTop=b.scrollHeight;},50);

    const inputRow=el("div",{style:{display:"flex",gap:8,alignItems:"start"}});
    const ta=el("textarea",{style:{...inputSt,flex:1,minHeight:42,resize:"none",lineHeight:1.4}});
    ta.placeholder="Escribe un mensaje... (Enter para enviar)";
    ta.addEventListener("keydown",async e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();const t=ta.value.trim();if(t){await sendMessage(t,STATE.user.role);}}});
    const sendBtn=el("button",{style:{...btnPrimarySt,padding:"9px 14px",flexShrink:0},onClick:async()=>{const t=ta.value.trim();if(t)await sendMessage(t,STATE.user.role);}},`→`);
    inputRow.append(ta,sendBtn);
    wrap.append(msgBox,inputRow);
  }
  return wrap;
}

// ── RESUMEN ───────────────────────────────────────────────────────────────────
function renderResumen(diff){
  const {expenses,events,agreements}=STATE;
  const wrap=el("div",{});
  const total=expenses.reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const pendingTotal=expenses.filter(e=>e.status==="pendiente").reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const byCat={};expenses.forEach(e=>{byCat[e.cat]=(byCat[e.cat]||0)+parseFloat(e.amount||0);});
  const topCats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const cd={J:0,E:0,ambos:0};
  events.forEach(ev=>{let d=new Date(ev.from+"T12:00:00"),end=new Date(ev.to+"T12:00:00");while(d<=end){cd[ev.who]=(cd[ev.who]||0)+1;d.setDate(d.getDate()+1);}});
  const td=cd.J+cd.E+cd.ambos;

  const statsGrid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}});
  [[expenses.length,"Gastos","#2563eb"],[fmtMoney(total),"Total acumulado","#059669"],[fmtMoney(pendingTotal),"Pendiente","#d97706"],[agreements.filter(a=>a.status==="activo").length,"Acuerdos activos","#7c3aed"]].forEach(([v,l,c])=>{
    const s=el("div",{style:{...cardSt,textAlign:"center"}});s.append(el("div",{style:{fontSize:17,fontWeight:700,color:c}},String(v)),el("div",{style:{fontSize:11,color:"#64748b",marginTop:2}},l));statsGrid.appendChild(s);
  });
  wrap.appendChild(statsGrid);

  if(td>0){
    const cCard=el("div",{style:{...cardSt,marginBottom:14}});
    cCard.appendChild(el("div",{style:{fontWeight:600,fontSize:14,marginBottom:10}},"Distribución custodia"));
    const bar=el("div",{style:{display:"flex",height:10,borderRadius:5,overflow:"hidden",marginBottom:8}});
    [["J","#2563eb"],["E","#7c3aed"],["ambos","#059669"]].forEach(([k,c])=>{if(cd[k]>0)bar.appendChild(el("div",{style:{flex:cd[k],background:c}}));});
    cCard.appendChild(bar);
    const cRow=el("div",{style:{display:"flex",gap:14,flexWrap:"wrap"}});
    [["J","Jorge","#2563eb"],["E","Eva","#7c3aed"],["ambos","Ambos","#059669"]].forEach(([k,l,c])=>{
      if(cd[k]>0){const d=el("div",{style:{display:"flex",alignItems:"center",gap:5}});d.append(el("div",{style:{width:8,height:8,borderRadius:2,background:c}}),el("span",{style:{fontSize:12}},`${l}: `),el("strong",{},`${cd[k]}d`),el("span",{style:{fontSize:11,color:"#94a3b8"}},`(${Math.round(cd[k]/td*100)}%)`));cRow.appendChild(d);}
    });
    cCard.append(cRow);wrap.appendChild(cCard);
  }

  if(topCats.length>0){
    const catCard=el("div",{style:{...cardSt,marginBottom:14}});
    catCard.appendChild(el("div",{style:{fontWeight:600,fontSize:14,marginBottom:12}},"Por categoría"));
    topCats.forEach(([cat,amt])=>{
      const r=el("div",{style:{marginBottom:10}});
      const t=el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}});
      t.append(el("span",{style:{fontSize:13}},cat),el("span",{style:{fontSize:13,fontWeight:600}},fmtMoney(amt)));
      const bar=el("div",{style:{height:5,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}});
      bar.appendChild(el("div",{style:{height:"100%",background:"#2563eb",width:`${(amt/total)*100}%`,borderRadius:3}}));
      r.append(t,bar);catCard.appendChild(r);
    });
    wrap.appendChild(catCard);
  }

  wrap.appendChild(el("button",{style:{...btnPrimarySt,width:"100%",background:"#1e293b"},onClick:exportPDF},"📄 Exportar informe PDF"));
  return wrap;
}

// ── Mini helpers ───────────────────────────────────────────────────────────────
function inputEl(type,val,onChange,placeholder=""){
  const i=el("input",{type,style:inputSt,placeholder});
  i.value=val;
  i.addEventListener("input",e=>onChange(e.target.value));
  if(type==="date") i.addEventListener("change",e=>onChange(e.target.value));
  return i;
}
function selectEl(options,val,onChange){
  const s=el("select",{style:inputSt});
  options.forEach(o=>s.appendChild(el("option",{value:o},o)));
  s.value=val;s.addEventListener("change",e=>onChange(e.target.value));
  return s;
}

const cardSt={background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:16};
const inputSt={width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:14,boxSizing:"border-box",background:"#f8fafc",outline:"none",fontFamily:"inherit"};
const lblSt={display:"block",fontSize:12,fontWeight:600,color:"#64748b",marginBottom:6};
const btnPrimarySt={background:"#2563eb",color:"#fff",border:"none",borderRadius:10,padding:"11px 20px",fontWeight:600,fontSize:14,fontFamily:"inherit"};
const btnSmSt={background:"#f1f5f9",border:"none",borderRadius:8,padding:"6px 12px",fontSize:16,color:"#1e293b"};

// ── Boot ──────────────────────────────────────────────────────────────────────
(async()=>{
  document.getElementById("app").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#64748b;font-family:system-ui">Cargando…</div>';
  await loadAll();
  render();
})();
</script>
