function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className') e.className=v;
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function inp(type, val, cb, placeholder='', cls='input'){
  const i = el('input',{type,placeholder,className:cls});
  i.value=val||'';
  i.addEventListener(type==='date'?'change':'input',e=>cb(e.target.value));
  return i;
}
function sel(options, val, cb){
  const s=el('select',{className:'input'});
  options.forEach(([v,l])=>{ const o=el('option',{value:v},l); if(v===val)o.selected=true; s.appendChild(o); });
  s.addEventListener('change',e=>cb(e.target.value));
  return s;
}

// ── Weekly schedule generator ─────────────────────────────────────────────────
// Pattern: week A = Jorge (L-D), week B = Eva (L-D), wednesday optional
function generateWeeklySchedule(startDate, weeksAhead=26, wednesdayMode='optional'){
  // startDate must be a Monday; startWith = 'J' or 'E'
  const events=[];
  let cur = new Date(startDate+'T12:00:00');
  let whoWeek = 'J'; // Jorge starts
  for(let w=0;w<weeksAhead;w++){
    const mon  = new Date(cur);
    const sun  = new Date(cur); sun.setDate(sun.getDate()+6);
    const wed  = new Date(cur); wed.setDate(wed.getDate()+2);
    const thu  = new Date(cur); thu.setDate(thu.getDate()+3);
    const monStr = mon.toISOString().slice(0,10);
    const sunStr = sun.toISOString().slice(0,10);
    const wedStr = wed.toISOString().slice(0,10);
    const thuStr = thu.toISOString().slice(0,10);
    const other  = whoWeek==='J'?'E':'J';

    if(wednesdayMode==='fixed_other'){
      // L-M con whoWeek, X con other, J-D con whoWeek
      events.push({from:monStr, to:addDays(monStr,1), who:whoWeek, note:'Turno semanal (L-M)', auto:true});
      events.push({from:wedStr, to:wedStr, who:other, note:'Miércoles fijo', auto:true});
      events.push({from:thuStr, to:sunStr, who:whoWeek, note:'Turno semanal (J-D)', auto:true});
    } else {
      // Semana completa
      events.push({from:monStr, to:sunStr, who:whoWeek, note:'Turno semanal', auto:true});
    }
    // Advance week
    cur.setDate(cur.getDate()+7);
    whoWeek = other;
  }
  return events;
}

  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Informe Coparentalidad ${now}</title>

h1{font-size:22px;margin-bottom:4px}h2{font-size:14px;margin:22px 0 8px;border-bottom:2px solid #3b82f6;padding-bottom:4px;color:#2563eb}
table{width:100%;border-collapse:collapse;margin-bottom:14px}th{background:#f8fafc;text-align:left;padding:7px 9px;font-size:11px;border:1px solid #e2e8f0;color:#64748b}
td{padding:7px 9px;border:1px solid #e2e8f0;font-size:11px}.meta{color:#64748b;font-size:11px;margin-bottom:24px}

<body><h1>🤝 Informe de Coparentalidad</h1><div class="meta">Generado el ${now} · Jorge · Eva · ${child.name||'Menor'}</div>
<h2>Resumen</h2><div style="margin-bottom:18px">
<div class="stat"><div class="stat-n">${expenses.length}</div><div class="stat-l">Gastos</div></div>
<div class="stat"><div class="stat-n">${fmtM(total)}</div><div class="stat-l">Total</div></div>
<div class="stat"><div class="stat-n">${fmtM(pendTotal)}</div><div class="stat-l">Pendiente</div></div>
<div class="stat"><div class="stat-n">${td}</div><div class="stat-l">Días custodia</div></div></div>
${td>0?`<h2>Custodia</h2><table><tr><th>Jorge</th><th>Eva</th><th>Ambos</th><th>Total</th></tr><tr><td>${cd.J}d (${Math.round(cd.J/td*100)}%)</td><td>${cd.E}d (${Math.round(cd.E/td*100)}%)</td><td>${cd.ambos}d</td><td>${td}d</td></tr></table>`:''}
${pend.length>0?`<h2>Gastos pendientes</h2><table><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Importe</th><th>Paga</th><th>Reparto</th></tr>${pend.map(e=>`<tr><td>${fmt(e.date)}</td><td>${e.desc}</td><td>${e.cat}</td><td>${fmtM(e.amount)}</td><td>${e.paidBy==='J'?'Jorge':'Eva'}</td><td>${e.split}</td></tr>`).join('')}</table>`:''}
${agreements.filter(a=>a.status==='activo').length>0?`<h2>Acuerdos activos</h2><table><tr><th>Fecha</th><th>Categoría</th><th>Acuerdo</th><th>Detalle</th></tr>${agreements.filter(a=>a.status==='activo').map(a=>`<tr><td>${fmt(a.date)}</td><td>${a.category}</td><td>${a.title}</td><td>${a.detail||'-'}</td></tr>`).join('')}</table>`:''}
<div class="footer">Documento de registro privado. Para uso con validez legal contactar con mediador o abogado de familia.</div></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);
}

// ── RENDER ROOT ───────────────────────────────────────────────────────────────
function render(){

}

// ── SHELL ─────────────────────────────────────────────────────────────────────
function renderShell(){
  const wrap=el('div',{});

  // Balance
  const pend=S.expenses.filter(e=>e.status==='pendiente');
  const bal={J:0,E:0};
  pend.forEach(e=>{const a=parseFloat(e.amount||0);if(e.split==='50-50'){const h=a/2;if(e.paidBy==='J')bal.E+=h;else bal.J+=h;}else if(e.split==='100% Jorge'){if(e.paidBy==='E')bal.J+=a;}else if(e.split==='100% Eva'){if(e.paidBy==='J')bal.E+=a;}});
  const diff=bal.E-bal.J;

  // Alerts
  const alerts=[];
  S.expenses.filter(e=>e.status==='pendiente').forEach(e=>{const age=Math.round((Date.now()-new Date(e.date+'T12:00:00'))/86400000);if(age>=14)alerts.push(`"${e.desc}" — ${age}d pendiente`);});
  S.events.forEach(ev=>{const d=daysUntil(ev.from);if(d>=0&&d<=2)alerts.push(`Cambio de custodia ${d===0?'HOY':`en ${d}d`} → ${nameOf(ev.who)}`);});
  S.events.filter(ev=>ev.changeStatus==='pendiente').forEach(()=>alerts.push('Solicitud de cambio pendiente de confirmar'));

  // Header
  const hdr=el('div',{className:'header'});
  const hL=el('div',{style:{display:'flex',alignItems:'center',gap:12}});
  hL.append(el('span',{style:{fontSize:22}},'🤝'),el('div',{}));
  hL.children[1].append(
    el('div',{style:{fontWeight:800,fontSize:15,letterSpacing:-0.3}},'Coparentalidad'),
    el('div',{style:{color:'#64748b',fontSize:11}},`${S.user.name} · ${S.child.name||'Martina'}`)
  );
  const hR=el('div',{style:{display:'flex',gap:8,alignItems:'center'}});
  if(Math.abs(diff)>0.01) hR.appendChild(badge(diff>0?`Eva debe ${fmtM(diff)}`:`Jorge debe ${fmtM(Math.abs(diff))}`,'badge-warn'));
  hR.append(
    el('button',{className:'btn-ghost',style:{fontSize:11},onClick:exportPDF},'📄 PDF'),
    el('button',{className:'btn-ghost',style:{fontSize:11,padding:'6px 10px'},onClick:()=>{S.user=null;rtSubs.forEach(s=>sb.removeChannel(s));render();}},'Salir')
  );
  hdr.append(hL,hR);

  // Alert bar
  let alertEl=null;
  if(alerts.length){
    alertEl=el('div',{className:'alert-bar'});
    alertEl.appendChild(el('span',{style:{fontSize:14,flexShrink:0}},'⚠️'));
    const aw=el('div',{style:{display:'flex',gap:8,overflowX:'auto'}});
    alerts.forEach(a=>aw.appendChild(el('span',{className:'alert-pill'},a)));
    alertEl.appendChild(aw);
  }

  // Tabs
  const TABS=['🏠 Inicio','📅 Custodia','💶 Gastos','👤 Ficha','📝 Acuerdos','✅ Intercambio','📊 Stats'];
  const tabBar=el('div',{className:'tab-bar'});
  TABS.forEach((t,i)=>tabBar.appendChild(el('button',{className:'tab-btn'+(S.tab===i?' active':''),onClick:()=>{S.tab=i;render();}},t)));

  const content=el('div',{className:'content fade-in'});
  if(S.tab===0) content.appendChild(renderDashboard(diff));
  if(S.tab===1) content.appendChild(renderCustodia());
  if(S.tab===2) content.appendChild(renderGastos(diff));
  if(S.tab===3) content.appendChild(renderFicha());
  if(S.tab===4) content.appendChild(renderAcuerdos());
  if(S.tab===5) content.appendChild(renderIntercambio());
  if(S.tab===6) content.appendChild(renderStats());

  wrap.append(hdr);
  if(alertEl) wrap.append(alertEl);
  wrap.append(tabBar,content);
  return wrap;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

      el('span',{},`Próximo cambio: `),

    stats.appendChild(s);

    bc.append(
      el('div',{style:{fontSize:11,color:'#fb923c',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}},'💶 Saldo pendiente'),
      el('div',{style:{fontWeight:800,fontSize:20,color:'#fed7aa'}},diff>0?`Eva debe ${fmtM(Math.abs(diff))}`:`Jorge debe ${fmtM(Math.abs(diff))}`),
      el('div',{style:{fontSize:12,color:'#64748b',marginTop:4}},`${pend.length} gastos · ${fmtM(pend.reduce((s,e)=>s+parseFloat(e.amount||0),0))}`)

  if(S.messages.length>0){

  const upcoming=[...S.events].filter(ev=>ev.to>=today()&&ev.changeStatus!=='rechazado').sort((a,b)=>a.from.localeCompare(b.from)).slice(0,8);

        el('div',{style:{fontSize:12,color:'#475569'}},`${fmt(ev.from)} → ${fmt(ev.to)} · ${daysBetween(ev.from,ev.to)}d`)

function renderCalMonth(){
  const wrap=el('div',{});
  const nav=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}});
  nav.append(
    el('button',{className:'btn-sm',onClick:()=>{if(UI.calMonth===0){UI.calMonth=11;UI.calYear--;}else UI.calMonth--;render();}},'←'),
    el('span',{style:{fontWeight:700,fontSize:15}},`${MONTHS_L[UI.calMonth]} ${UI.calYear}`),
    el('button',{className:'btn-sm',onClick:()=>{if(UI.calMonth===11){UI.calMonth=0;UI.calYear++;}else UI.calMonth++;render();}},'→')
  );

  // Legend
  const leg=el('div',{style:{display:'flex',gap:14,marginBottom:12,flexWrap:'wrap',alignItems:'center'}});
  [['J','Jorge','#60a5fa'],['E','Eva','#a78bfa'],['ambos','Ambos','#6ee7b7'],['wed','Miérc. opcional','#f97316']].forEach(([k,l,color])=>{
    const d=el('div',{style:{display:'flex',alignItems:'center',gap:6}});
    d.append(
      el('div',{style:{width:12,height:12,borderRadius:3,background:k==='wed'?'#431407':color,border:k==='wed'?'1px dashed #f97316':'none'}}),
      el('span',{style:{fontSize:11,color:'#94a3b8'}},l)
    );
    leg.appendChild(d);
  });

  // Build day map — miércoles fijo gets special treatment
  const dayMap={};
  const wedMap={};
  S.events.forEach(ev=>{
    if(ev.changeStatus==='rechazado') return;
    if(ev.note==='Miércoles fijo'&&ev.from===ev.to){
      wedMap[ev.from]=ev; return;
    }
    let d=new Date(ev.from+'T12:00:00'),end=new Date(ev.to+'T12:00:00');
    while(d<=end){
      const k=d.toISOString().slice(0,10);
      if(!wedMap[k]) dayMap[k]=ev;
      d.setDate(d.getDate()+1);
    }
  });

  const cal=el('div',{className:'card-dark',style:{padding:10,marginBottom:14}});
  const calHdr=el('div',{className:'cal-grid',style:{marginBottom:4}});
  ['L','M','X','J','V','S','D'].forEach(d=>calHdr.appendChild(el('div',{className:'cal-day-hdr'},d)));
  cal.appendChild(calHdr);

  const firstDay=new Date(UI.calYear,UI.calMonth,1).getDay();
  const dim=new Date(UI.calYear,UI.calMonth+1,0).getDate();
  const offset=(firstDay+6)%7;
  const grid=el('div',{className:'cal-grid'});

  for(let i=0;i<offset;i++) grid.appendChild(el('div',{}));
  for(let n=1;n<=dim;n++){
    const key=`${UI.calYear}-${String(UI.calMonth+1).padStart(2,'0')}-${String(n).padStart(2,'0')}`;
    const ev=dayMap[key];
    const wedEv=wedMap[key];
    const isTdy=key===today();
    const isPend=ev&&ev.changeStatus==='pendiente';

    let bgColor='transparent', textColor='#94a3b8', borderStyle='none', clickEv=null;
    if(wedEv){
      bgColor='#431407'; textColor='#f97316'; borderStyle='1px dashed #f97316'; clickEv=wedEv;
    } else if(ev&&!isPend){
      bgColor=CUSTODY_BG[ev.who]; textColor=CUSTODY_TEXT[ev.who]; clickEv=ev;
    } else if(isPend){
      borderStyle='1px dashed #475569'; clickEv=ev;
    }

    const cell=el('div',{
      className:'cal-cell'+(ev||wedEv?' has-event':''),
      style:{background:bgColor},
      onClick:()=>{if(clickEv){UI.calSelected=clickEv;render();}}
    });
    cell.appendChild(el('div',{
      className:'cal-num'+(isTdy?' today':''),
      style:{color:isTdy?'':textColor, border:isTdy?'none':borderStyle}
    },String(n)));
    if(wedEv&&!isTdy) cell.appendChild(el('div',{style:{width:5,height:5,borderRadius:'50%',background:'#f97316',marginTop:1}}));
    grid.appendChild(cell);
  }
  cal.appendChild(grid);
  wrap.append(nav,leg,cal);
  return wrap;
}

function renderCalWeek(){
  const wrap=el('div',{});
  // Get Monday of current week
  const ref=new Date(); ref.setHours(12,0,0,0);
  const dow=ref.getDay(); const diff=dow===0?-6:1-dow;
  ref.setDate(ref.getDate()+diff+UI.weekOffset*7);

  const nav=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}});
  nav.append(
    el('button',{className:'btn-sm',onClick:()=>{UI.weekOffset=(UI.weekOffset||0)-1;render();}},'←'),
    el('span',{style:{fontWeight:700,fontSize:14}},`Semana del ${ref.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}`),
    el('button',{className:'btn-sm',onClick:()=>{UI.weekOffset=(UI.weekOffset||0)+1;render();}},'→')
  );

  const dayMap={};
  S.events.forEach(ev=>{
    if(ev.changeStatus==='rechazado') return;

  const ta=el('textarea',{className:'input',style:{minHeight:70,resize:'vertical',marginBottom:10}});
  ta.value=UI.aiParserText||'';
  ta.placeholder='Describe el periodo de custodia…';

  if(UI.aiParserLoading){

  } else if(UI.aiParserResult){
    const r=UI.aiParserResult;
    const prev=el('div',{className:'card-dark',style:{marginBottom:10}});
    prev.appendChild(el('div',{style:{fontSize:11,color:'#64748b',marginBottom:8}},'Resultado interpretado:'));
    prev.append(
      el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},[el('span',{style:{fontSize:12,color:'#94a3b8'}},'Con quién:'),el('span',{style:{fontSize:12,fontWeight:700,color:CUSTODY_TEXT[r.who]||'#f1f5f9'}},nameOf(r.who))]),
      el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},[el('span',{style:{fontSize:12,color:'#94a3b8'}},'Desde:'),el('span',{style:{fontSize:12,fontWeight:700}},fmt(r.from))]),
      el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},[el('span',{style:{fontSize:12,color:'#94a3b8'}},'Hasta:'),el('span',{style:{fontSize:12,fontWeight:700}},fmt(r.to))]),
      el('div',{style:{display:'flex',justifyContent:'space-between'}},[el('span',{style:{fontSize:12,color:'#94a3b8'}},'Nota:'),el('span',{style:{fontSize:12,fontWeight:700}},r.note||'—')])
    );
    wrap.appendChild(prev);
    const bRow=el('div',{style:{display:'flex',gap:8}});
    bRow.append(
      el('button',{className:'btn-primary',style:{flex:1},onClick:async()=>{
        await dbAddEvent({...UI.aiParserResult,changeRequest:false});
        UI.showAiParser=false;UI.aiParserText='';UI.aiParserResult=null;
      }},'✓ Añadir al calendario'),
      el('button',{className:'btn-ghost',style:{flex:1},onClick:()=>{UI.aiParserResult=null;render();}},'Reintentar')
    );
    wrap.appendChild(bRow);
  } else {
    wrap.appendChild(el('button',{className:'btn-primary',style:{width:'100%'},onClick:async()=>{
      if(!UI.aiParserText.trim()) return;
      UI.aiParserLoading=true;render();
      try{
        const yr=new Date().getFullYear();
        const prompt=`Hoy es ${today()}. Analiza este texto sobre un plan de custodia y devuelve SOLO un objeto JSON con estos campos exactos: who (J=Jorge, E=Eva, ambos), from (YYYY-MM-DD), to (YYYY-MM-DD), note (string breve). Texto: "${UI.aiParserText}". Responde SOLO con el JSON, sin explicación ni markdown.`;
        const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,messages:[{role:'user',content:prompt}]})});
        const data=await resp.json();
        const text=data.content?.[0]?.text||'';
        const clean=text.replace(/```json|```/g,'').trim();
        UI.aiParserResult=JSON.parse(clean);
      }catch(e){
        UI.aiParserResult={who:'J',from:today(),to:today(),note:'Error al interpretar — edita manualmente'};

      UI.aiParserLoading=false;render();
    }},'🤖 Interpretar con IA')}
  );
  return wrap;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const wrap=el('div',{});
  const now=new Date();

  // ── Custody distribution ──
  const cd={J:0,E:0,ambos:0};
  S.events.forEach(ev=>{
    if(ev.changeStatus==='rechazado') return;
    let d=new Date(ev.from+'T12:00:00'),end=new Date(ev.to+'T12:00:00');
    while(d<=end){cd[ev.who]=(cd[ev.who]||0)+1;d.setDate(d.getDate()+1);}
  });
  const td=cd.J+cd.E+cd.ambos;

  if(td>0){
    const cc=el('div',{className:'card',style:{marginBottom:14}});
    cc.appendChild(el('div',{style:{fontWeight:700,fontSize:14,marginBottom:12}},'📅 Distribución de custodia'));
    // Bar
    const bar=el('div',{style:{display:'flex',height:14,borderRadius:7,overflow:'hidden',marginBottom:12}});
    [['J','#3b82f6'],['E','#8b5cf6'],['ambos','#10b981']].forEach(([k,c])=>{
      if(cd[k]>0) bar.appendChild(el('div',{style:{flex:cd[k],background:c}}));
    });
    cc.appendChild(bar);
    const statsRow=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}});
    [['J','Jorge','#3b82f6'],['E','Eva','#8b5cf6'],['ambos','Ambos','#10b981']].forEach(([k,l,c])=>{
      if(cd[k]===0) return;
      const s=el('div',{style:{textAlign:'center',padding:'10px 6px',background:'#0f172a',borderRadius:10,border:`1px solid ${c}22`}});
      s.append(
        el('div',{style:{fontWeight:800,fontSize:18,color:c}},`${Math.round(cd[k]/td*100)}%`),
        el('div',{style:{fontSize:11,color:'#64748b',marginTop:2}},l),
        el('div',{style:{fontSize:10,color:'#334155'}},`${cd[k]} días`)
      );
      statsRow.appendChild(s);
    });
    cc.appendChild(statsRow);
    wrap.appendChild(cc);
  }

  // ── Monthly expenses last 6 months ──
  const monthly={};
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthly[key]={total:0,J:0,E:0,label:MONTHS[d.getMonth()]};
  }
  S.expenses.forEach(e=>{
    const key=e.date.slice(0,7);
    if(monthly[key]){
      const a=parseFloat(e.amount||0);
      monthly[key].total+=a;
      monthly[key][e.paidBy]=(monthly[key][e.paidBy]||0)+a;
    }
  });
  const entries=Object.entries(monthly);
  const maxVal=Math.max(...entries.map(([,v])=>v.total),1);

  if(entries.some(([,v])=>v.total>0)){
    const ec=el('div',{className:'card',style:{marginBottom:14}});
    ec.appendChild(el('div',{style:{fontWeight:700,fontSize:14,marginBottom:14}},'💶 Gastos últimos 6 meses'));
    const chart=el('div',{style:{display:'flex',gap:6,alignItems:'flex-end',height:100,marginBottom:8}});
    entries.forEach(([key,v])=>{
      const col2=el('div',{style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}});
      if(v.total>0) col2.appendChild(el('div',{style:{fontSize:9,color:'#64748b',textAlign:'center'}},`${Math.round(v.total)}€`));
      const barWrap=el('div',{style:{width:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-end',height:80,gap:1}});
      // Stacked: Jorge on bottom, Eva on top
      const jH=Math.round((v.J/maxVal)*78);
      const eH=Math.round((v.E/maxVal)*78);
      if(v.E>0) barWrap.appendChild(el('div',{style:{width:'100%',height:eH+'px',background:'#8b5cf6',borderRadius:'3px 3px 0 0',minHeight:v.E>0?3:0}}));
      if(v.J>0) barWrap.appendChild(el('div',{style:{width:'100%',height:jH+'px',background:'#3b82f6',borderRadius:v.E>0?0:'3px 3px 0 0',minHeight:v.J>0?3:0}}));
      if(v.total===0) barWrap.appendChild(el('div',{style:{width:'100%',height:4,background:'#1e293b',borderRadius:3}}));
      col2.appendChild(barWrap);
      col2.appendChild(el('div',{style:{fontSize:9,color:'#475569',textAlign:'center'}},v.label));
      chart.appendChild(col2);
    });
    ec.appendChild(chart);
    // Legend
    const leg=el('div',{style:{display:'flex',gap:14,marginTop:4}});
    [['#3b82f6','Jorge'],['#8b5cf6','Eva']].forEach(([c,l])=>{
      const d=el('div',{style:{display:'flex',alignItems:'center',gap:5}});
      d.append(el('div',{style:{width:10,height:10,borderRadius:2,background:c}}),el('span',{style:{fontSize:11,color:'#64748b'}},l));
      leg.appendChild(d);
    });
    ec.appendChild(leg);
    wrap.appendChild(ec);
  }

  // ── Expense breakdown ──
  const byCat={};
  S.expenses.forEach(e=>{byCat[e.cat]=(byCat[e.cat]||0)+parseFloat(e.amount||0);});
  const topCats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const totalExp=S.expenses.reduce((s,e)=>s+parseFloat(e.amount||0),0);

  if(topCats.length>0){
    const bc=el('div',{className:'card',style:{marginBottom:14}});
    bc.appendChild(el('div',{style:{fontWeight:700,fontSize:14,marginBottom:12}},'📊 Gastos por categoría'));
    topCats.forEach(([cat,amt])=>{
      const r=el('div',{style:{marginBottom:10}});
      const t=el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}});
      t.append(el('span',{style:{fontSize:13}},cat),el('span',{style:{fontSize:13,fontWeight:700}},`${fmtM(amt)} (${Math.round(amt/totalExp*100)}%)`));
      const barWrap=el('div',{style:{height:6,background:'#0f172a',borderRadius:3,overflow:'hidden'}});
      barWrap.appendChild(el('div',{style:{height:'100%',background:'#3b82f6',width:`${amt/totalExp*100}%`,borderRadius:3}}));
      r.append(t,barWrap);bc.appendChild(r);
    });
    // Totals
    const pend=S.expenses.filter(e=>e.status==='pendiente').reduce((s,e)=>s+parseFloat(e.amount||0),0);
    bc.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',paddingTop:10,borderTop:'1px solid #0f172a',marginTop:4}},[
      el('div',{style:{textAlign:'center'}},[el('div',{style:{fontWeight:800,fontSize:16}},fmtM(totalExp)),el('div',{style:{fontSize:11,color:'#64748b'}},'Total')]),
      el('div',{style:{textAlign:'center'}},[el('div',{style:{fontWeight:800,fontSize:16,color:'#fb923c'}},fmtM(pend)),el('div',{style:{fontSize:11,color:'#64748b'}},'Pendiente')]),
      el('div',{style:{textAlign:'center'}},[el('div',{style:{fontWeight:800,fontSize:16,color:'#6ee7b7'}},fmtM(totalExp-pend)),el('div',{style:{fontSize:11,color:'#64748b'}},'Liquidado')]),
    ]));
    wrap.appendChild(bc);
  }

  // ── Agreements by category ──
  const byAg={};
  S.agreements.filter(a=>a.status==='activo').forEach(a=>{byAg[a.category]=(byAg[a.category]||0)+1;});
  if(Object.keys(byAg).length>0){
    const ac=el('div',{className:'card'});
    ac.appendChild(el('div',{style:{fontWeight:700,fontSize:14,marginBottom:10}},'📝 Acuerdos activos por área'));
    Object.entries(byAg).sort((a,b)=>b[1]-a[1]).forEach(([cat,n])=>{
      const r=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #0f172a'}});
      r.append(el('span',{style:{fontSize:13}},cat),badge(String(n),'badge-J'));
      ac.appendChild(r);
    });
    wrap.appendChild(ac);
  }

  if(td===0&&totalExp===0) wrap.appendChild(el('div',{style:{textAlign:'center',color:'#475569',padding:'40px 0',fontSize:13}},'Añade datos para ver las estadísticas'));
  return wrap;
}

// ── INTERCAMBIO ───────────────────────────────────────────────────────────────
function renderIntercambio(){
  const wrap=el('div',{});

  // Notification card
  const notifCard=el('div',{className:'card',style:{marginBottom:14}});
  notifCard.appendChild(el('div',{style:{fontWeight:700,fontSize:14,marginBottom:8}},'🔔 Recordatorios de cambio'));

    notifCard.appendChild(el('div',{style:{fontSize:12,color:'#475569'}},'Tu navegador no soporta notificaciones.'));

    notifCard.append(
      el('div',{style:{fontSize:12,color:'#6ee7b7',marginBottom:6}},'✅ Notificaciones activadas'),

  // Next handover info
  const todayStr=today();
  const nextEv=[...S.events].filter(ev=>ev.from>=todayStr&&ev.changeStatus!=='rechazado').sort((a,b)=>a.from.localeCompare(b.from))[0];
  if(nextEv){
    const nc=el('div',{className:'today-card',style:{marginBottom:14}});

    );
    wrap.appendChild(nc);
  }

  // Checklist
  const cc=el('div',{className:'card'});
  const ch=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}});
  const done=S.checklist.filter(i=>i.done).length;
  ch.append(
    el('div',{},[
      el('div',{style:{fontWeight:700,fontSize:14}},'✅ Checklist de intercambio'),
      el('div',{style:{fontSize:11,color:'#64748b',marginTop:2}},`${done}/${S.checklist.length} completados`)
    ]),
    el('button',{className:'btn-ghost',style:{fontSize:11},onClick:()=>{
      S.checklist=S.checklist.map(i=>({...i,done:false}));
      saveChecklist(S.checklist);render();
    }},'Resetear')
  );
  cc.appendChild(ch);

  // Progress bar
  const prog=el('div',{style:{height:6,background:'#1e293b',borderRadius:3,overflow:'hidden',marginBottom:14}});
  prog.appendChild(el('div',{style:{height:'100%',background:'#3b82f6',width:`${S.checklist.length?done/S.checklist.length*100:0}%`,borderRadius:3,transition:'width .3s'}}));
  cc.appendChild(prog);

  S.checklist.forEach((item,idx)=>{
    const r=el('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid #0f172a'}});
    const chk=el('button',{
      style:{width:22,height:22,borderRadius:5,border:'1px solid',borderColor:item.done?'#3b82f6':'#334155',background:item.done?'#3b82f6':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12},
      onClick:()=>{S.checklist[idx].done=!S.checklist[idx].done;saveChecklist(S.checklist);render();}
    },item.done?'✓':'');
    r.append(chk,el('div',{style:{flex:1,fontSize:13,color:item.done?'#475569':'#e2e8f0',textDecoration:item.done?'line-through':'none'}},item.text));
    // Delete button
    r.appendChild(el('button',{style:{background:'none',border:'none',color:'#334155',fontSize:12,cursor:'pointer'},onClick:()=>{S.checklist.splice(idx,1);saveChecklist(S.checklist);render();}},'✕'));
    cc.appendChild(r);
  });

  // Add item
  const addRow=el('div',{style:{display:'flex',gap:8,marginTop:12}});
  const newInp=el('input',{className:'input',placeholder:'Añadir elemento al checklist…',style:{flex:1}});
  newInp.value=UI.checklistItem||'';
  newInp.addEventListener('input',e=>UI.checklistItem=e.target.value);
  newInp.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&newInp.value.trim()){
      S.checklist.push({id:Date.now(),text:newInp.value.trim(),done:false});
      saveChecklist(S.checklist);UI.checklistItem='';render();
    }
  });
  addRow.append(newInp,el('button',{className:'btn-primary',style:{flexShrink:0,padding:'10px 14px'},onClick:()=>{
    if(newInp.value.trim()){
      S.checklist.push({id:Date.now(),text:newInp.value.trim(),done:false});
      saveChecklist(S.checklist);UI.checklistItem='';render();
    }
  }},'+'));
  cc.appendChild(addRow);
  wrap.appendChild(cc);
  return wrap;
}

// ── Init ──────────────────────────────────────────────────────────────────────
UI.weekOffset = 0;
UI.loginRole  = 'J';
(async()=>{
  await loadAll();
  S.checklist = loadChecklist();
  S.notifEnabled = ('Notification' in window && Notification.permission==='granted');
  render();
  scheduleUpcomingNotifications();
})();
</script>
</body>
